<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapLibre + OpenFreeMap 演示</title>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
    .marker-title {
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 13px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const map = new maplibregl.Map({
      container: 'map',
      // OpenFreeMap 免费样式，无需 token
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [113.65, 34.75],  // 河南省中心
      zoom: 6,
    });

    // 添加缩放和导航控件
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl(), 'bottom-left');

    map.on('load', () => {
      // ---- 示例：标注阎连科相关地点 ----
      const locations = [
        { name: '洛阳（阎连科故乡）', lng: 112.45, lat: 34.62 },
        { name: '耙耧山脉（小说背景）', lng: 111.85, lat: 34.05 },
        { name: '北京', lng: 116.41, lat: 39.90 },
      ];

      locations.forEach(loc => {
        const el = document.createElement('div');
        el.className = 'marker-title';
        el.textContent = loc.name;

        new maplibregl.Marker({ element: el, anchor: 'center' })
          .setLngLat([loc.lng, loc.lat])
          .addTo(map);
      });
    });
  </script>
</body>
</html>
